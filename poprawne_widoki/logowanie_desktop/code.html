<!DOCTYPE html>

<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased">
<!-- Main Container -->
<main class="w-full max-w-[1000px] bg-surface-container-lowest rounded-[32px] shadow-[0_16px_32px_rgba(40,54,24,0.06)] overflow-hidden flex flex-col md:flex-row">
<!-- Left Side - Form -->
<div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
<!-- Logo Section -->
<div class="flex items-center gap-3 mb-8">
<div class="w-12 h-12 bg-primary-container text-on-primary-container rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">psychiatry</span>
</div>
<h1 class="font-display text-headline-lg text-primary">CameLog</h1>
</div>
<!-- Header -->
<div class="mb-8">
<h2 class="font-headline-md text-headline-md text-on-background mb-2">Zaloguj się do CameLog</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Zadbaj o swoje rośliny i nie przegap żadnego podlewania.</p>
</div>
<!-- Form -->
<form class="space-y-6 flex-grow">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Adres e-mail</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border-2 border-outline-variant rounded-xl text-on-surface placeholder-outline focus:ring-0 focus:border-primary transition-colors duration-200" id="email" name="email" placeholder="twoj@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Hasło</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors duration-200" href="#">Zapomniałeś hasła?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border-2 border-outline-variant rounded-xl text-on-surface placeholder-outline focus:ring-0 focus:border-primary transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-surface-tint hover:shadow-[0_8px_16px_rgba(40,54,24,0.08)] transition-all duration-200 active:scale-[0.98]" type="submit">
<span>Zaloguj się</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Nie masz konta? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors duration-200" href="#">Zarejestruj się</a>
</p>
</div>
</div>
<!-- Right Side - Illustration -->
<div class="hidden md:flex w-1/2 bg-surface-container relative items-center justify-center overflow-hidden p-12">
<!-- Decorative background elements -->
<div class="absolute top-0 right-0 w-64 h-64 bg-secondary-container rounded-full blur-3xl opacity-40 -translate-y-1/2 translate-x-1/4"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-primary-container rounded-full blur-3xl opacity-20 translate-y-1/3 -translate-x-1/4"></div>
<!-- Illustration Container -->
<div class="relative z-10 w-full max-w-[400px] aspect-square rounded-[40px] overflow-hidden shadow-[0_24px_48px_rgba(40,54,24,0.12)]">
<img alt="Minimalistyczne zdjęcie pustynnej rośliny w doniczce." class="w-full h-full object-cover" data-alt="A stylized, modern botanical illustration or photograph featuring a resilient desert plant, such as an aloe or small agave, in a simple terracotta pot. The background is a soft, warm cream or sand color. The lighting is gentle and diffused, evoking a calm oasis atmosphere. The overall aesthetic should align with a modern, tactile app interface using earthy pigments like olive green, soft terracotta, and cream." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDR7oRDPxRvFiJEPvtp_b2gsKLK4hTiy5RZzhvmJgbEKqPv_HavUMwVQ9Su3MQfgNAeBxsrPIXEaCJI6oJ6xPVELk323cVPiISSeo26xOeczWRBDAmXN3dkr3A_gKL301aqQ9I5SNfEnqRwlxDfENzGjCIdppoSaN-9teytsW7QeyTcIDRXtFamMTtPPH_F21TfoExag1azC26t0eX3VcHW1IkgPBrYUZSuVZog_8EWXcHY8xJgmeSlN8PcXpmwnkKlHR4FZpw8A7pP"/>
<!-- Glassmorphism overlay card -->
<div class="absolute bottom-6 left-6 right-6 bg-surface-container-lowest/80 backdrop-blur-md p-4 rounded-2xl border border-outline-variant/30 flex items-center gap-4 shadow-lg">
<div class="w-10 h-10 bg-tertiary-container text-on-tertiary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined fill">water_drop</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-0.5">Przypomnienie</p>
<p class="font-label-md text-label-md text-on-surface">Czas podlać Fikusa</p>
</div>
</div>
</div>
</div>
