<body class="bg-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-[480px]">
<div class="bg-surface-container-lowest rounded-xl shadow-sm p-gutter md:p-[48px] flex flex-col gap-[32px] w-full border border-surface-variant relative overflow-hidden">
<div class="absolute -top-32 -right-32 w-64 h-64 bg-surface-container-low rounded-full blur-3xl opacity-50 pointer-events-none"></div>
<div class="absolute -bottom-32 -left-32 w-64 h-64 bg-secondary-container rounded-full blur-3xl opacity-20 pointer-events-none"></div>
<div class="flex flex-col items-center text-center gap-unit relative z-10">
<div class="w-24 h-24 bg-surface-container-high rounded-full flex items-center justify-center mb-[16px] shadow-sm text-primary">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Zaloguj się do CameLog</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[300px]">Zadbaj o swoje rośliny i nie przegap żadnego podlewania.</p>
</div>
<form action="#" class="flex flex-col gap-[24px] relative z-10" method="POST">
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="email">Adres e-mail</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-[16px] flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border-2 border-outline-variant rounded-lg pl-[48px] pr-[16px] py-[16px] font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-0 transition-colors shadow-sm placeholder:text-outline" id="email" name="email" placeholder="twoj@email.pl" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Hasło</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Zapomniałeś hasła?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-[16px] flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border-2 border-outline-variant rounded-lg pl-[48px] pr-[16px] py-[16px] font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-0 transition-colors shadow-sm placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Pokaż hasło" class="absolute inset-y-0 right-0 pr-[16px] flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-[16px] rounded-full shadow-sm hover:shadow-md transition-all duration-200 mt-unit" type="submit">
                    Zaloguj się
                </button>
</form>
<div class="flex flex-col items-center gap-[16px] mt-[16px] relative z-10 border-t border-surface-variant pt-[24px]">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Nie masz jeszcze konta?
                </p>
<a class="font-label-md text-label-md text-primary bg-primary-fixed hover:bg-primary-fixed-dim px-[24px] py-[12px] rounded-full transition-colors w-full text-center" href="#">
                    Zarejestruj się
                </a>
</div>
</div>
