<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="CameLog">
  <!-- Wielbłąd + drzewo, minimalistyczny styl płaski -->
  <!-- Tło zaokrąglonego kwadratu -->
  <rect width="64" height="64" rx="14" fill="#e2f4c8"/>

  <!-- Korona drzewa (forest green) -->
  <path d="M32 10c-7 0-11 4-11 9 0 5 4 8 11 8s11-3 11-8c0-5-4-9-11-9z" fill="#55612e"/>
  <!-- Pień drzewa -->
  <path d="M30 27v9c0 3 4 3 4 0v-9z" fill="#8f4a00"/>

  <!-- Wielbłąd (terakota) – jego garb to korona drzewa, tworzy spójność -->
  <path d="M14 44c0-2 1-4 3-5 1-1 3-1 5 0l3 1c1 0 2-1 3-2l3-3c2-2 5-2 7 0l3 4 3 1c2 0 5 1 6 4l1 3c0 1-1 2-2 2H16c-1 0-2-1-2-2v-3z" fill="#ae611a"/>

  <!-- Oko wielbłąda -->
  <circle cx="42" cy="40" r="1.2" fill="#121f05"/>

  <!-- Listek/serce u stóp -->
  <path d="M30 53c0-1 1-2 2-2s2 1 2 2c0 1-2 3-2 3s-2-2-2-3z" fill="#8f4a00"/>
</svg>
